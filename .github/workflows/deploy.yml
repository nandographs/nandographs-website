name: Deploy to Hostinger FTP

on:
  push:
    branches:
      - master # Ou 'main', dependendo do nome da sua branch principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # A pasta gerada pelo build do Vite
          server-dir: ./public_html/ # A pasta pública da sua Hostinger
          dangerous-clean-slate: false # Mude para true se quiser que a action apague arquivos antigos do servidor antes de subir os novos
